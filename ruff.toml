# Конфигурация ruff. Помимо дефолтных правил (E4/E7/E9, F) включаем isort (I):
# порядок импортов по PEP 8 — группы (future, stdlib, сторонние, локальные),
# между группами пустая строка, внутри группы по алфавиту.
# Проверяется и автоправится: ruff check --fix.
target-version = "py311"

[lint]
extend-select = ["I", "Q"]

[lint.flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"
docstring-quotes = "double"
avoid-escape = false
