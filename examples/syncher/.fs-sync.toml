# Песочница fs-syncher: два локальных профиля (без сети).
# remote_root указывает на локальные каталоги-приёмники в составе песочницы,
# поэтому прогон детерминирован и воспроизводим. Канонический прогон — --dry-run.
# Правила работают на уровне КАТАЛОГОВ (исключение/возврат папок целиком).

[defaults]
delete_threshold = 100
delete_threshold_pct = 25

# Профиль зеркалирования: ПК → "сервер" (локальный каталог server/).
[[sync]]
name = "site"
local_root = "source"
remote_root = "server"
delete = true
checksum = true                          # сверка по содержимому: одинаковые папки не передаются
exclude = ["node_modules/", "cache/", "build/"]
include = ["projects/keep/build/"]       # override: вернуть один build/ внутри проекта keep

# Профиль выгрузки (offload): накопительный архив на "сервере".
[[backup]]
name = "vault"
local_root = "archive"
remote_root = "server-archive"
after_push = "archive"                   # в боевом режиме перенос подтверждённого в _fs-backup
verify = true
